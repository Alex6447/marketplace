name: CI

on:
  push:
    branches: [main]
  pull_request:

# Отменяем устаревшие прогоны при новом пуше в ту же ветку/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python · ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace (+ dev-группа)
        run: uv sync

      - name: Ruff — lint
        run: uv run ruff check .

      - name: Ruff — format check
        run: uv run ruff format --check .

  frontend:
    name: Frontend · eslint + tsc + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Установка из корня — pnpm-воркспейс с единым lock-файлом.
      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm --filter @marketplace/frontend lint

      - name: Prettier — format check
        run: pnpm --filter @marketplace/frontend format:check

      - name: TypeScript + build
        run: pnpm --filter @marketplace/frontend build
