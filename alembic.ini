# Конфигурация Alembic. Строка подключения здесь НЕ задаётся —
# migrations/env.py берёт её из DATABASE_URL (.env) через marketplace_shared.db.config,
# чтобы был один источник правды для приложения и миграций.

[alembic]
script_location = migrations
# Шаблон имени файла ревизии: дата + слаг — миграции сортируются по времени.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
prepend_sys_path = .
path_separator = os

[post_write_hooks]
# Автоформат сгенерированных миграций ruff'ом (линт+import-sort из корневого pyproject).
# Тип exec: ruff вызывается как бинарь с PATH (в console_scripts его entrypoint не зарегистрирован).
hooks = ruff_check, ruff_format
ruff_check.type = exec
ruff_check.executable = ruff
ruff_check.options = check --fix REVISION_SCRIPT_FILENAME
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
