[project]
name = "marketplace-shared"
version = "0.1.0"
description = "Общие контракты и провайдер-абстракции (Pydantic-схемы, LLMProvider/ImageProvider)."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    # Hosted LLM-провайдер (AnthropicLLMProvider). Чистый Python, лёгкий —
    # допустимо и в тонком API-образе. Версия — с поддержкой output_config/adaptive.
    "anthropic>=0.69",
    # Hosted image-провайдер (GeminiImageProvider) — официальный SDK Gemini.
    # Чистый Python; модель gemini-2.5-flash-image (editing «сохрани товар, смени фон»).
    "google-genai>=1.0",
    # Скачивание изображений по presigned-URL (MinIO/S3) во входах image-провайдера.
    "httpx>=0.27",
    # ORM и драйвер БД — модель данных общая для api/worker (docs/plan.md, раздел 5).
    # psycopg (v3) обслуживает и async-движок приложения, и sync-движок Alembic
    # через единый диалект postgresql+psycopg — один драйвер на оба сценария.
    "sqlalchemy[asyncio]>=2.0",
    "psycopg[binary]>=3.2",
    # Миграции схемы. Пакет лёгкий (Mako+SQLAlchemy) — допустим и в тонком API-образе,
    # чтобы `alembic upgrade head` можно было прогнать из контейнера API.
    "alembic>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/marketplace_shared"]
