# docker-compose для локальной разработки.
#
# Профили:
#   (по умолчанию)  — инфраструктура: postgres, redis, minio (+ инициализация бакета).
#   app             — сервисы приложения: api, worker. Их образы/тулинг и Dockerfile
#                     появятся на следующих пунктах Этапа 0 (см. docs/plan.md, раздел 7),
#                     поэтому пока они под отдельным профилем и не стартуют по умолчанию.
#
# Запуск инфраструктуры:   docker compose up -d
# Запуск всего (позже):    docker compose --profile app up -d --build
#
# ⚠️ Внутри docker-сети хосты сервисов — это их имена (postgres, redis, minio),
#    а НЕ localhost. Значения в .env (DATABASE_URL и пр.) рассчитаны на запуск
#    кода с хост-машины; для контейнеров переменные заданы прямо здесь.

name: marketplace

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web-консоль
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Одноразовая инициализация: создаёт бакет для изображений и выходит.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-marketplace} &&
      echo 'Бакет ${S3_BUCKET:-marketplace} готов.';
      "
    restart: "no"

  # --- Сервисы приложения (профиль app) ---------------------------------------
  # Dockerfile и каркас появятся на следующих пунктах Этапа 0. До этого момента
  # сборка профиля app невозможна — это ожидаемо.

  api:
    profiles: ["app"]
    build:
      context: ./apps/api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-marketplace}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-marketplace}
    ports:
      - "8000:8000"

  worker:
    profiles: ["app"]
    build:
      context: ./apps/worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-marketplace}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-marketplace}

volumes:
  postgres_data:
  redis_data:
  minio_data:
