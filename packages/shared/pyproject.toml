[project]
name = "marketplace-shared"
version = "0.1.0"
description = "Общие контракты и провайдер-абстракции (Pydantic-схемы, LLMProvider/ImageProvider)."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    # Hosted LLM-провайдер (AnthropicLLMProvider). Чистый Python, лёгкий —
    # допустимо и в тонком API-образе. Версия — с поддержкой output_config/adaptive.
    "anthropic>=0.69",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/marketplace_shared"]
